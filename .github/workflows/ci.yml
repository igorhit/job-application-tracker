name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/backend/ApplicationTracker.slnx

      - name: Build
        run: dotnet build src/backend/ApplicationTracker.slnx --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/backend/ApplicationTracker.UnitTests --no-build --configuration Release --verbosity normal

      - name: Integration Tests
        run: dotnet test tests/backend/ApplicationTracker.IntegrationTests --no-build --configuration Release --verbosity normal

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/frontend
        run: npx playwright install --with-deps chromium

      - name: Start application stack
        run: docker compose up --build -d

      - name: Run E2E tests
        working-directory: src/frontend
        run: npm run test:e2e

      - name: Capture Docker logs
        if: always()
        run: docker compose logs --no-color > docker-compose.log

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: src/frontend/test-results
          if-no-files-found: ignore

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: docker-compose.log
          if-no-files-found: ignore

      - name: Stop application stack
        if: always()
        run: docker compose down -v
